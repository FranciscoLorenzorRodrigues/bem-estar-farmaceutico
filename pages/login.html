<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Bem-Estar Farmacêutico</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header class="topo">
        <div class="logo-topo">
            <img src="../imagens/Logo.png" alt="Logo">
        </div>
    </header>

    <main class="container">

         <div class="card-principal">

        <div class="lado-esquerdo">
            <img src="../imagens/Logo.png"  alt="Logo principal" class="logo-principal">
            
            <p>Onde Facilitamos sua Saúde</p>
        </div>

        
        <div class="lado-direito">

            <div class="login-box">
                <h2>LOGIN</h2>

                <label>E-mail:</label>
                <input type="email">

                <label>Senha:</label>
                <input type="password">

                <div class="opcoes">
                    <label>
                        <input type="checkbox"> Lembrar?
                    </label>
                    <a href="#">Esqueceu a senha?</a>
                </div>

                <button class="btn-entrar">ENTRAR</button>

                <button class="btn-google">
                    <img src="../imagens/google.jpg" alt="Google">
                    Conectar com o Google
                </button>

                <p class="cadastro">
                    Não possui uma conta? <a href="#">Crie uma.</a>
                </p>
            </div>

        </div>
        
        </div>

    </main>
    <script src="../js/script.js"></script> 
</body>
</html>
