<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem Estar Farmacêutico - Produtos</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header class="header">
        <div class="logo-topo">
            <img src="../imagens/Logo.png" alt="Bem-Estar" class="logo">
        </div>
    </header>

    <main class="container-revisao">
        <div class="stepper">
            <div class="step completed">1</div>
            <div class="line filled"></div>
            <div class="step completed">2</div>
            <div class="line filled"></div>
            <div class="step completed">3</div>
            <div class="line"></div>
            <div class="step">4</div>
        </div>

        <div class="loja-header">
            <div class="loja-foto-circulo">
                <img src="../imagens/drogasil.webp" alt="Drogasil">
            </div>
            <h2>Drogasil - Anápolis</h2>
        </div>

        <div class="revisao-grid">
            
            <div class="coluna-pagamento">
                <div class="info-row">
                    <img src="../imagens/Visa.png" alt="Visa" class="icon-revisao">
                    <div class="texto-info">
                        <strong>Método de Pagamento</strong>
                        <span>Visa</span>
                    </div>
                    <a href="#" class="btn-trocar">Trocar</a>
                </div>

                <div class="info-row">
                    <img src="../imagens/Coupon.png" alt="Cupom" class="icon-revisao">
                    <div class="texto-info">
                        <strong>Cupons de Desconto</strong>
                        <span>2 para usar nessa loja</span>
                    </div>
                    <a href="#" class="btn-trocar">Trocar</a>
                </div>

                <div class="info-row">
                    <img src="../imagens/cpf.png" alt="CPF" class="icon-revisao">
                    <div class="texto-info">
                        <strong>CPF na Nota</strong>
                        <span>XXX.XXX.XXX-XX</span>
                    </div>
                    <a href="#" class="btn-trocar">Trocar</a>
                </div>
            </div>

            <div class="coluna-valores">
                <div class="valor-item">
                    <span>Valor</span>
                    <span>-</span>
                </div>
                <div class="valor-item">
                    <span>Taxa de entrega</span>
                    <span>R$ 5,00</span>
                </div>
                <div class="valor-item">
                    <span>Taxa de serviço</span>
                    <span>R$ 0,99</span>
                </div>
                <div class="valor-total">
                    <span>Total</span>
                    <span>R$ 47,02</span>
                </div>
            </div>
        </div>

        <div class="footer-acoes">
            <button class="btn-voltar-seta"> < Voltar </button>
            <button class="btn-confirmar-final">Confirmar pedido</button>
        </div>
    </main>

</body>
</html>
